[book]
title = "Rust for C/C++ Programmers"
authors = ["Rust Training Team"]
language = "en"
description = "Rust training materials for C and C++ programmers covering ownership, RAII, FFI, embedded development, and no_std."
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "theme"
git-repository-url = "https://github.com/microsoft/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js", "theme/language-toggle.js"]
additional-css = ["theme/custom.css"]
site-url = "/RustTraining/c-cpp-book/"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true
