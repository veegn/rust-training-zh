[book]
title = "Rust Engineering Practices 鈥?Beyond cargo build"
authors = ["Rust Training Team"]
language = "zh-CN"
description = "Rust engineering guidance covering build scripts, cross-compilation, coverage, CI/CD, and production tooling."
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "../theme"
git-repository-url = "https://github.com/microsoft/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["../theme/mermaid.min.js", "../theme/mermaid-init.js"]
additional-css = ["../theme/custom.css"]
site-url = "/RustTraining/engineering-book/"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true



