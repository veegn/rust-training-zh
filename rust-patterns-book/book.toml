[book]
title = "Rust Patterns & Engineering How-Tos"
authors = ["Rust Training Team"]
language = "zh-CN"
description = "Advanced Rust patterns covering Pin, allocators, lock-free structures, unsafe code, and systems-level design."
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "../theme"
git-repository-url = "https://github.com/microsoft/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["../theme/mermaid.min.js", "../theme/mermaid-init.js", "../theme/language-toggle.js"]
additional-css = ["../theme/custom.css"]
site-url = "/RustTraining/rust-patterns-book/"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true



