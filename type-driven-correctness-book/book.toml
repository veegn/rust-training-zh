[book]
title = "Type-Driven Correctness in Rust"
authors = ["Rust Training Team"]
language = "en"
description = "Expert Rust material covering type-state, phantom types, capability tokens, and correctness-driven API design."
src = "src"

[build]
build-dir = "book"

[output.html]
theme = "theme"
git-repository-url = "https://github.com/microsoft/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js", "theme/language-toggle.js"]
additional-css = ["theme/custom.css"]
site-url = "/RustTraining/type-driven-correctness-book/"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true
